name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      - name: Ruff
        run: uv run ruff check dramatiq_postgres/ tests/

      - name: Black
        run: uv run black --check dramatiq_postgres/ tests/

      - name: Mypy
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.14"]
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-groups --all-extras

      # Functional tests start a real Postgres via testcontainers and
      # spawn actual dramatiq workers.
      - name: Tests
        run: uv run pytest tests
